# nixpacks.toml — BB Universal Auth Demo
# Tells Railway how to build the Vite + React demo from the demo/ subdir.

[phases.setup]
nixPkgs = ['nodejs_20', 'pnpm-9_x']

[phases.install]
cmds = ['pnpm install --frozen-lockfile=false']

[phases.build]
cmds = ['pnpm run build']

[start]
cmd = 'pnpm run preview -- --host 0.0.0.0 --port $PORT'
