# @bb/universal-auth | .github/workflows/ci.yml | v1.0.0-rc.1 | 2026-04-24 | BB
# Runs on every PR per plan §CI/CD

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@bb'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests (coverage gate 90% lines / 85% branches per §11.2 L1086)
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Bundle size check (§12.1 L1199: core≤40KB, passkey≤10KB, sw≤5KB)
        run: pnpm size-check

      - name: Verify sideEffects:false + no inline scripts
        run: pnpm verify:bundle

      - name: Verify watermarks on every source file
        run: pnpm verify:watermarks

      - name: Verify no `jose` in prod deps (§Appendix B L1447)
        run: pnpm verify:no-jose

      - name: npm audit (0 critical/high)
        run: pnpm audit --prod --audit-level=high

  # integration + contract + browser + chaos jobs added in Block 3+ (Days 5+)
  # see plan §CI/CD "On every PR" for full list
