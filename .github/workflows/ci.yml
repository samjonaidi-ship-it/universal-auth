# @samjonaidi-ship-it/universal-auth | .github/workflows/ci.yml | v1.0.1 | 2026-05-01 | BB
# Per-PR CI gate. Block 6 Day 22 expansion: + perf cold-start, + memory soak
# (5 min CI cap), + security suite. Heavy suites (24h soak, full chaos,
# Playwright matrix) live in chaos.yml nightly.
#
# v1.0.1 (Phase E4 + E5): all third-party actions pinned to commit SHAs per
# OpenSSF supply-chain hardening. New `dependency-review` job runs on PR only
# and fails the build on critical/high CVEs in changed dependencies.

name: CI
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:unit
      - run: pnpm build
      - run: pnpm size-check
      - run: pnpm verify:bundle
      - run: pnpm verify:watermarks
      - run: pnpm verify:no-jose
      - run: pnpm audit --prod --audit-level=high

  perf:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Cold-start budget (≤ 50 ms throttled)
        run: pnpm test:perf

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Security suite (fuzzing, CSRF, IDB tamper, token replay)
        run: pnpm test:security

  memory-quick:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Memory soak (5 min, --expose-gc, deadlock + cycle-progress gate)
        # NOTE 2026-05-02: heap-budget assertion is skipped because vitest
        # uses fake-indexeddb which retains ~3 KB per IDB op (bisect-traced).
        # Real heap gate lives in test/browser/06-memory-soak.spec.ts (chaos.yml).
        env:
          BB_SOAK_DURATION_MS: '300000' # 5 min
          BB_SOAK_SKIP_BUDGET: '1'
          NODE_OPTIONS: '--expose-gc'
        run: pnpm test:memory

  # Phase E5 (v1.0.1): supply-chain dependency review on PR. Fails the build
  # on critical/high CVEs in any newly added or upgraded dependency. Runs only
  # on pull_request because it diffs the base branch against the head ref.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Dependency Review (fail on critical/high)
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019 # v4.5.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
