# @samjonaidi-ship-it/universal-auth | .github/workflows/chaos.yml | v1.1.0 | 2026-05-08 | BB
# Nightly chaos + 24h memory soak per spec §11.6 + §11.7.
#
# v1.0.4 also added (L2.14 — landed in this version, no separate semver bump):
#   - + integration job: real Neon test branch (neonctl branches create from
#     prod `production` branch) + ct-bff pointed at it via the
#     docker-compose.neon.yml override. Closes the Neon-HTTP-vs-local-pg
#     blocker called out in test/integration/docker-compose.test.yml line 60-77.
#     A5 audit gates #2 + #4 unblocked once Sam's secrets are set (L2.14a).
#   - Gated on repo variable NEON_INTEGRATION_ENABLED=true. Until set, the job
#     shows as "skipped" (green CI), not red. Chaos job left unchanged — same
#     blocker but out of L2.14 scope (deferred to v1.0.5+).
#   - Branch lifecycle: created from prod `production` branch (inherits live
#     schema), torn down in `if: always()` so failures never leak branches.
#     Branch name is `ci-int-<run_id>-<attempt>` for traceability.
#   - URI masked via `::add-mask::` before exporting to GITHUB_ENV.
# v1.1.0 (2026-04-30):
#   - Cross-repo checkout of samjoonaidi-ship-it/BB_ControlTower as sibling so
#     test/integration/docker-compose.test.yml can build ct-bff from source
#     (was failing in 30s with "path .../BB_ControlTower not found").
#   - memory-24h: bump heap to 4 GB + force GC every cycle (prior nightly OOM'd
#     at hour 5.3 of 24 with default 2 GB heap).
# v1.0.2 (2026-05-02):
#   - memory-24h: heap-budget assertion skipped — vitest+fake-indexeddb retains
#     ~3 KB per IDB op (bisect-traced); real heap gate moved to memory-browser
#     job below which runs against real Chromium IDB.
#   - + memory-browser: 100k-cycle soak against Playwright Chromium with
#     performance.memory.usedJSHeapSize assertion, no fake-indexeddb.

name: Nightly Chaos + Soak
on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC daily
  workflow_dispatch:

# Silence the Node-20 deprecation warning by opting into Node 24 for JS actions
# (actions/checkout, actions/setup-node, pnpm/action-setup). Forced by default
# 2026-06-02; opting in early keeps the runs warning-free until we upgrade the
# action pins themselves.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# NOTE: NEON_PROJECT_ID is the production Neon project hosting the ct_bff
# schema. Stored as a repo secret (not env literal) so it's not in git history.
# If the secret is unset the integration job is skipped — see job `if:` guard.

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # L2.14: Integration tests against a real Neon test branch.
  # Replaces the previously-blocked local-pg path. The branch is forked from
  # the prod Neon main branch (so it inherits current ct_bff schema +
  # migrations) and torn down after the run.
  # ─────────────────────────────────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run if the Neon API key is wired up. Until Sam adds the secret,
    # this job shows as skipped (not red) so CI stays green.
    if: ${{ vars.NEON_INTEGRATION_ENABLED == 'true' }}
    outputs:
      branch_name: ${{ steps.neon.outputs.branch_name }}
    steps:
      - name: Checkout universal-auth
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: universal-auth

      - name: Checkout BB_ControlTower (sibling repo for ct-bff Dockerfile)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: samjonaidi-ship-it/BB_ControlTower
          token: ${{ secrets.BB_CROSS_REPO_PAT }}
          path: BB_ControlTower

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: universal-auth/pnpm-lock.yaml

      - name: Install deps
        working-directory: universal-auth
        run: pnpm install --frozen-lockfile

      - name: Install neonctl
        run: npm install -g neonctl@2

      # Create a fresh Neon branch forked from prod `production` (the default
      # branch on Neon project polished-lab-12287925; overridable via the
      # NEON_PARENT_BRANCH repo variable). Inherits whatever schema +
      # migrations are live in production at this moment, so we never have to
      # maintain a parallel migration runner here.
      - name: Create Neon test branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_PARENT_BRANCH: ${{ vars.NEON_PARENT_BRANCH }}
          NEON_ROLE_NAME: ${{ vars.NEON_ROLE_NAME }}
          NEON_DATABASE_NAME: ${{ vars.NEON_DATABASE_NAME }}
        run: |
          set -euo pipefail
          BRANCH_NAME="ci-int-${{ github.run_id }}-${{ github.run_attempt }}"
          # Parent branch defaults to `production` (Neon project polished-lab-12287925's
          # default branch). Override via NEON_PARENT_BRANCH repo var if needed.
          PARENT_BRANCH="${NEON_PARENT_BRANCH:-production}"
          echo "Creating Neon branch $BRANCH_NAME (forked from $PARENT_BRANCH)"
          # neonctl writes a "WARNING: parent branch is protected..." line to
          # stdout BEFORE the JSON when parent is protected. Use --no-color
          # and grep from the first '{' to skip the warning prefix.
          neonctl branches create \
            --project-id "$NEON_PROJECT_ID" \
            --name "$BRANCH_NAME" \
            --parent "$PARENT_BRANCH" \
            --no-color \
            --output json 2>/tmp/branch.stderr | sed -n '/^{/,$p' > /tmp/branch.json
          if [ ! -s /tmp/branch.json ]; then
            echo "::error::neonctl branches create produced no JSON"
            cat /tmp/branch.stderr || true
            exit 1
          fi

          # Try `connection_uris[0].connection_uri` first (fast path when parent
          # is unprotected). When parent is protected, Neon creates a new role
          # password but does NOT include it in `branches create` output —
          # `connection_uris` will be missing/null. In that case fall back to
          # `neonctl connection-string` which fetches a usable URI for the new
          # branch's freshly-minted role. Project polished-lab-12287925 has
          # multiple roles (bb_runtime_app + neondb_owner), so we must specify
          # both --role-name and --database-name.
          DB_URL=$(jq -r '.connection_uris[0].connection_uri // empty' /tmp/branch.json)
          if [ -z "$DB_URL" ] || [ "$DB_URL" = "null" ]; then
            echo "branch create did not return connection_uris (parent likely protected); fetching via connection-string"
            DB_URL=$(neonctl connection-string \
              --project-id "$NEON_PROJECT_ID" \
              --branch "$BRANCH_NAME" \
              --role-name "${NEON_ROLE_NAME:-neondb_owner}" \
              --database-name "${NEON_DATABASE_NAME:-neondb}" \
              --pooled 2>/tmp/connstr.stderr || true)
          fi
          if [ -z "$DB_URL" ] || [ "$DB_URL" = "null" ]; then
            echo "::error::could not resolve Neon connection string for branch $BRANCH_NAME"
            echo "--- branch.json ---"
            cat /tmp/branch.json
            echo "--- connstr.stderr ---"
            cat /tmp/connstr.stderr || true
            exit 1
          fi
          echo "::add-mask::$DB_URL"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "Neon branch ready"

      - name: Seed integration test users
        working-directory: universal-auth
        run: |
          set -euo pipefail
          # Production has Mike/Sarah/Tom seeded but the integration test
          # helpers use the spec §10.3 user names (test-crew-1, test-supplier-1,
          # test-client-1, test-admin). Seed them now into the per-run Neon
          # branch — production is unaffected because the branch is destroyed
          # in cleanup. Idempotent INSERT ... ON CONFLICT DO NOTHING.
          sudo apt-get install -y --no-install-recommends postgresql-client >/dev/null 2>&1
          psql "$DATABASE_URL" -f test/integration/seed-test-users.sql

      - name: Bring up integration stack (ct-bff → Neon branch + mocks)
        working-directory: universal-auth
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          docker compose \
            -f test/integration/docker-compose.test.yml \
            -f test/integration/docker-compose.neon.yml \
            up -d twilio-mock resend-mock ct-bff

      - name: Wait for ct-bff to become healthy
        working-directory: universal-auth
        run: |
          for i in $(seq 1 90); do
            STATE=$(docker inspect --format='{{.State.Health.Status}}' bb-integration-ct-bff 2>/dev/null || echo "missing")
            echo "  attempt $i: ct-bff health=$STATE"
            if [ "$STATE" = "healthy" ]; then
              echo "ct-bff is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "ct-bff did not become healthy after 180s — dumping logs"
          docker logs bb-integration-ct-bff --tail=200 || true
          exit 1

      - name: Run integration suite (8 scenarios, §11.3)
        working-directory: universal-auth
        env:
          INTEGRATION_BASE_URL: http://localhost:3300
          TEST_MODE_KEY: test-key-do-not-use-in-prod
        run: pnpm test:integration

      - name: Capture container logs on failure (BEFORE teardown)
        if: failure()
        working-directory: universal-auth
        run: |
          echo "=== ct-bff ==="
          docker logs bb-integration-ct-bff --tail=300 2>&1 || true
          echo "=== twilio-mock ==="
          docker logs bb-integration-twilio-mock --tail=80 2>&1 || true
          echo "=== resend-mock ==="
          docker logs bb-integration-resend-mock --tail=80 2>&1 || true
          echo "=== compose ps ==="
          docker compose \
            -f test/integration/docker-compose.test.yml \
            -f test/integration/docker-compose.neon.yml ps -a || true

      - name: Tear down docker stack
        if: always()
        working-directory: universal-auth
        run: |
          docker compose \
            -f test/integration/docker-compose.test.yml \
            -f test/integration/docker-compose.neon.yml \
            down -v || true

      # CRITICAL: run last + always — never leak a Neon branch.
      - name: Cleanup Neon test branch
        if: always() && steps.neon.outputs.branch_name != ''
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          BRANCH_NAME: ${{ steps.neon.outputs.branch_name }}
        run: |
          echo "Deleting Neon branch $BRANCH_NAME"
          neonctl branches delete \
            --project-id "$NEON_PROJECT_ID" \
            "$BRANCH_NAME" \
            --confirm || echo "::warning::Failed to delete Neon branch $BRANCH_NAME — manual cleanup required"

  chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      docker:
        image: docker:24-dind
        options: --privileged
    steps:
      - name: Checkout universal-auth
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: universal-auth

      - name: Checkout BB_ControlTower (sibling repo for ct-bff Dockerfile + migrations)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: samjonaidi-ship-it/BB_ControlTower
          token: ${{ secrets.BB_CROSS_REPO_PAT }}
          path: BB_ControlTower

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: universal-auth/pnpm-lock.yaml

      - name: Install deps
        working-directory: universal-auth
        run: pnpm install --frozen-lockfile

      - name: Bring up integration + chaos stacks
        working-directory: universal-auth
        run: |
          docker compose \
            -f test/integration/docker-compose.test.yml \
            -f test/chaos/docker-compose.chaos.yml \
            up -d
          # Wait for ct-bff health (toxiproxy depends_on ct-bff)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8474/version >/dev/null; then
              echo "toxiproxy ready"; break
            fi
            sleep 2
          done

      - name: Wait for ct-bff to become healthy (separate from toxiproxy)
        working-directory: universal-auth
        run: |
          for i in $(seq 1 90); do
            STATE=$(docker inspect --format='{{.State.Health.Status}}' bb-integration-ct-bff 2>/dev/null || echo "missing")
            ALIVE=$(docker inspect --format='{{.State.Status}}' bb-integration-ct-bff 2>/dev/null || echo "missing")
            echo "  attempt $i: ct-bff health=$STATE  status=$ALIVE"
            if [ "$STATE" = "healthy" ]; then
              echo "ct-bff is healthy"
              exit 0
            fi
            # Early surface: ct-bff has historically crashed silently with
            # `docker logs --tail=200` returning empty by the time we got here
            # (container had already been removed). Dump logs the moment it
            # transitions to anything non-running so we actually see WHY.
            if [ "$ALIVE" = "exited" ] || [ "$ALIVE" = "dead" ]; then
              echo "ct-bff exited prematurely — exit code:"
              docker inspect --format='{{.State.ExitCode}}' bb-integration-ct-bff || true
              echo "=== ct-bff logs (all, while container still inspectable) ==="
              docker logs bb-integration-ct-bff 2>&1 || true
              echo "=== postgres tail ==="
              docker logs bb-integration-postgres --tail=80 2>&1 || true
              exit 1
            fi
            sleep 2
          done
          echo "ct-bff did not become healthy after 180s — dumping logs"
          docker logs bb-integration-ct-bff --tail=200 || true
          docker logs bb-integration-postgres --tail=80 || true
          exit 1

      - name: Run chaos suite (7 scenarios)
        working-directory: universal-auth
        run: pnpm test:chaos

      - name: Capture container logs on failure (BEFORE teardown — order matters)
        if: failure()
        working-directory: universal-auth
        run: |
          echo "=== ct-bff ==="
          docker logs bb-integration-ct-bff --tail=300 2>&1 || true
          echo "=== postgres ==="
          docker logs bb-integration-postgres --tail=100 2>&1 || true
          echo "=== toxiproxy ==="
          docker logs bb-chaos-toxiproxy --tail=100 2>&1 || true
          echo "=== compose ps ==="
          docker compose -f test/integration/docker-compose.test.yml -f test/chaos/docker-compose.chaos.yml ps -a || true

      - name: Tear down stacks
        if: always()
        working-directory: universal-auth
        run: |
          docker compose \
            -f test/integration/docker-compose.test.yml \
            -f test/chaos/docker-compose.chaos.yml \
            down -v

  memory-24h:
    runs-on: ubuntu-latest
    timeout-minutes: 1500  # 24h + slack
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 24h memory-leak soak (gates deadlock + cycle progress)
        # NOTE 2026-05-02: heap-budget assertion is skipped — vitest uses
        # fake-indexeddb which retains ~3 KB per IDB op (bisect-traced).
        # Real heap gate is in memory-browser job below.
        env:
          BB_SOAK_DURATION_MS: '86400000'  # 24h
          BB_SOAK_SKIP_BUDGET: '1'
          # 4 GB heap + expose GC for explicit reclaim between cycles
          # (prior 2 GB default OOM'd at hour 5.3)
          NODE_OPTIONS: '--expose-gc --max-old-space-size=4096'
        run: pnpm test:memory

  # v1.0.2 — Real-browser memory soak (the actual heap-budget gate).
  # Vitest+fake-indexeddb leaks ~3 KB per IDB op (bisect 2026-05-02), so the
  # Node soak above can only catch deadlocks/exceptions. This job runs the
  # SDK in real Chromium against real IndexedDB and asserts heap delta over
  # 100k cycles is within budget.
  memory-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - name: Real-browser memory soak (100k cycles, real IDB)
        env:
          BB_BROWSER_SOAK_CYCLES: '100000'
          PLAYWRIGHT_INCLUDE_SOAK: '1'
        run: pnpm exec playwright test --project=memory-soak
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report-memory-browser
          path: playwright-report/
          retention-days: 7
