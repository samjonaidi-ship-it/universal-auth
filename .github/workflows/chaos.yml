# @bb/universal-auth | .github/workflows/chaos.yml | v1.0.0-rc.1 | 2026-04-28 | BB
# Nightly chaos + 24h memory soak per spec §11.6 + §11.7 L1139.
# Heavier than CI; runs at 04:00 UTC and on workflow_dispatch.

name: Nightly Chaos + Soak
on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC daily
  workflow_dispatch:

jobs:
  chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      docker:
        image: docker:24-dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bring up integration + chaos stacks
        run: |
          docker compose \
            -f test/integration/docker-compose.test.yml \
            -f test/chaos/docker-compose.chaos.yml \
            up -d
          # Wait for ct-bff health (toxiproxy depends_on ct-bff)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8474/version >/dev/null; then
              echo "toxiproxy ready"; break
            fi
            sleep 2
          done
      - name: Run chaos suite (7 scenarios)
        run: pnpm test:chaos
      - name: Tear down stacks
        if: always()
        run: |
          docker compose \
            -f test/integration/docker-compose.test.yml \
            -f test/chaos/docker-compose.chaos.yml \
            down -v

  memory-24h:
    runs-on: ubuntu-latest
    timeout-minutes: 1500  # 24h + slack
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 24h memory-leak soak (gates heap budget)
        env:
          BB_SOAK_DURATION_MS: '86400000'  # 24h
          NODE_OPTIONS: '--expose-gc'
        run: pnpm test:memory
