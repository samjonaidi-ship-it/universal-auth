# @samjonaidi-ship-it/universal-auth | .github/workflows/browser-matrix.yml | v1.0.4 | 2026-05-04 | BB
# Nightly Playwright 12-config browser matrix per DoD A5 audit gate #3 (L2.12).
#
# 12 configs = 4 browsers × 3 form factors (see playwright.config.ts header for
# the full matrix table). Runs nightly at 03:00 UTC + on demand via
# workflow_dispatch. Per-PR runs use `browser-smoke` in ci.yml — only the 4
# desktop projects, ~5 min — to keep PR latency reasonable.
#
# GitHub Actions matrix shards the 12 projects across 4 jobs (one per browser
# engine) so Playwright can install only the browsers it needs per shard:
#   - chromium shard: desktop-chrome, mobile-chrome, tablet-chrome
#   - firefox shard:  desktop-firefox, mobile-firefox, tablet-firefox
#   - webkit shard:   desktop-webkit, mobile-safari, tablet-safari
#   - edge shard:     desktop-edge, mobile-edge, tablet-edge (channel: msedge)
#
# Edge requires `playwright install msedge` (installs Microsoft Edge Stable
# alongside Playwright's bundled Chromium). The edge shard installs both
# chromium (for the Pixel 7 + iPad Pro 11 device emulation base) and msedge
# (for the actual channel).

name: Browser Matrix (Nightly)
on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily — 1h before chaos.yml so the demo
                         # deploy + ct-bff are warm and we don't dogpile.
  workflow_dispatch:
    inputs:
      browser:
        description: 'Limit to a single browser shard (leave blank to run all 4)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - chromium
          - firefox
          - webkit
          - edge

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false  # one browser failing shouldn't cancel the others
      matrix:
        browser: [chromium, firefox, webkit, edge]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Skip non-selected shards on workflow_dispatch
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser != '' && github.event.inputs.browser != matrix.browser }}
        run: |
          echo "Skipping ${{ matrix.browser }} — workflow_dispatch limited to ${{ github.event.inputs.browser }}"
          exit 0

      - run: pnpm install --frozen-lockfile

      - name: Build SDK (test:browser hits dist/)
        run: pnpm build

      # Install only the browser this shard needs. Edge depends on chromium
      # for device emulation base + msedge for the channel itself.
      - name: Install Playwright browser (${{ matrix.browser }})
        run: |
          case "${{ matrix.browser }}" in
            chromium) pnpm exec playwright install --with-deps chromium ;;
            firefox)  pnpm exec playwright install --with-deps firefox ;;
            webkit)   pnpm exec playwright install --with-deps webkit ;;
            edge)     pnpm exec playwright install --with-deps chromium msedge ;;
          esac

      - name: Run ${{ matrix.browser }} shard (3 form factors)
        run: pnpm test:browser:${{ matrix.browser }}
        env:
          # Hit deployed demo unless caller overrides. Audit-fix 2026-05-04: was
          # auth-sdk-demo.bainbridgebuilders.com (DNS-dropped post-D20).
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://app.buildwithbainbridge.com' }}
          TEST_MODE_KEY: ${{ secrets.TEST_MODE_KEY }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  # Aggregate gate — all 4 shards must succeed for the matrix to pass.
  matrix-gate:
    needs: matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all browser shards passed
        run: |
          if [ "${{ needs.matrix.result }}" != "success" ]; then
            echo "Browser matrix failed — at least one shard did not pass"
            exit 1
          fi
          echo "All 12 configs across 4 browser shards passed"
