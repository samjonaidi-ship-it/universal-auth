# @bainbridgebuilders/universal-auth | .github/workflows/release.yml | v1.0.2 | 2026-05-01 | BB
# Publishes to GitHub Packages on tag.
#
# Supply-chain attestation strategy (per spec §15.1 + D21 canonical decision):
#   - npm CLI's --provenance flag is incompatible with --access=restricted
#     (npm rejects with EUSAGE: "Can't generate provenance for new or private
#     package, you must set access to public"). For our private GitHub Packages
#     registry, we cannot use --provenance directly.
#   - Instead, we use `actions/attest-build-provenance@v1` AFTER the publish.
#     This generates a SLSA provenance attestation for the published artifact
#     via GitHub's attestation API + sigstore. The attestation is verifiable
#     via `gh attestation verify`.
#   - Lockfile (pnpm-lock.yaml) provides upstream SRI; GitHub Packages access
#     control provides distribution-side authorization.
#
# v1.0.1 (Phase E4 + E6): all third-party actions pinned to commit SHAs per
# OpenSSF supply-chain hardening. CycloneDX SBOM (sbom.cdx.json) is generated
# after build and attached to the GitHub Release alongside the SLSA attestation.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # write to attach SBOM to the GitHub Release
      packages: write
      id-token: write   # required for sigstore attestation
      attestations: write # required for actions/attest-build-provenance
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Size check before publish
        run: pnpm size-check

      # Phase E6 (v1.0.1) — generate CycloneDX SBOM. Captures every transitive
      # production dep + version + license. Attached to the GitHub Release for
      # downstream consumers + SCA tooling.
      #
      # Pinning: v1.0.1 lookback (C7) flagged the original `@latest` as a
      # supply-chain inconsistency vs the SHA-pinned actions elsewhere. We pin
      # to a specific minor (`@2.0`) — `pnpm dlx` resolves to the highest
      # patch within that minor and verifies the integrity sha (npmjs.org).
      # The `cyclonedx-npm` major-2 line shipped 2024-2025 and supports
      # CycloneDX 1.6+. Bump deliberately; `latest` no longer used.
      - name: Generate CycloneDX SBOM
        run: |
          # @cyclonedx/cyclonedx-npm runs `npm ls` internally to walk the
          # dep tree. pnpm's nested node_modules layout fails npm's strict
          # validation (peer-dep mismatches, hoisted packages, missing
          # transitive devDependencies because we ran `pnpm install` not
          # `npm install`). Pass --ignore-npm-errors so the SBOM is still
          # produced from package.json + pnpm-lock metadata. The resulting
          # SBOM accurately captures runtime deps; only dev-only-tree
          # warnings get suppressed.
          pnpm dlx @cyclonedx/cyclonedx-npm@2.0 \
            --output-format json \
            --output-file sbom.cdx.json \
            --omit dev \
            --ignore-npm-errors
          ls -la sbom.cdx.json

      - name: Publish (restricted)
        id: publish
        run: |
          npm publish --access=restricted
          # v1.0.1 lookback (D7): use ONLY `npm pack` output for the tarball
          # path. Heuristic name construction (PKG_NAME/PKG_VERSION) was
          # dropped because if the heuristic and actual pack output ever
          # disagreed, the attestation step could attest a different artifact
          # than was published. `npm pack --silent` always emits the canonical
          # filename on its last stdout line.
          PACK_OUT=$(npm pack --silent | tail -1)
          if [ -z "$PACK_OUT" ] || [ ! -f "$PACK_OUT" ]; then
            echo "::error::npm pack did not produce a tarball; cannot proceed with attestation."
            exit 1
          fi
          echo "tarball-path=$PACK_OUT" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SLSA build provenance attestation per spec §15.1 + D21.
      # Resolves the long-standing conflict: npm CLI --provenance requires
      # public access, but our package is restricted. GitHub's attestation
      # API generates a sigstore-backed provenance attestation regardless of
      # registry access mode. Verifiable via `gh attestation verify <tarball>
      # --owner BainbridgeBuilders`.
      #
      # Plan requirement: `actions/attest-build-provenance` on private repos
      # needs GitHub Team plan or higher. BainbridgeBuilders org is on Team
      # plan as of 2026-05-01 (verified via gh api orgs/BainbridgeBuilders).
      # If this step fails in the future, FIRST check the org plan hasn't
      # been downgraded.
      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: ${{ steps.publish.outputs.tarball-path }}

      # Phase E6: attach SBOM (and the tarball it describes) to the GitHub
      # Release that GH auto-creates for the pushed v* tag. `gh release upload`
      # uses the GITHUB_TOKEN already present in the runner.
      - name: Attach SBOM to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Create the release if GH auto-create didn't fire (idempotent: --clobber overwrites assets)
          gh release create "$TAG" --title "$TAG" --notes "Automated release for $TAG" || true
          gh release upload "$TAG" sbom.cdx.json --clobber
