# @bb/universal-auth | .github/workflows/release.yml | v1.0.0-rc.1 | 2026-04-24 | BB
# Publishes to GitHub Packages on tag with --provenance per §15.1 L1359

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # required for npm provenance
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Size check before publish
        run: pnpm size-check

      # Note: --provenance is incompatible with --access=restricted (npm
      # CLI rejects with EUSAGE: "Can't generate provenance for new or
      # private package, you must set access to public"). SLSA provenance
      # requires public packages because the attestation URL must be
      # publicly verifiable.
      #
      # Spec §15.1 calls for `npm publish --provenance` but spec also
      # mandates private GitHub Packages registry. These conflict.
      # v1.0-rc.1 ships restricted without provenance; v1.1 should
      # revisit — options: (a) flip to public scoped access, (b) drop
      # provenance requirement from spec, (c) add a post-publish
      # cosign/sigstore attestation step.
      - name: Publish (restricted)
        run: npm publish --access=restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
