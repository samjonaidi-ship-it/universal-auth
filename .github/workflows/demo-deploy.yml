# @samjonaidi-ship-it/universal-auth | .github/workflows/demo-deploy.yml | v1.0.2 | 2026-05-04 | BB
# Railway deploy of demo/ — gated on RAILWAY_SERVICE_AUTH_DEMO secret presence so the
# workflow no-ops cleanly until the demo Railway service is provisioned. Audit-fix
# 2026-05-04: was running every push to main and failing with "service not found"
# because no Railway service exists yet (D20 cutover dropped auth-sdk-demo subdomain
# in favor of api.buildwithbainbridge.com). When demo is needed, set the two secrets
# below and the workflow self-activates.
#
# Required GitHub Actions secrets (set both to enable):
#   RAILWAY_TOKEN              — project-scoped Railway token (BB-Production)
#   RAILWAY_SERVICE_AUTH_DEMO  — service id of `auth-sdk-demo` once created in Railway dashboard
#
# One-time Railway setup when re-enabling:
#   1. Railway dashboard → BB-Production → New Service → GitHub Repo
#   2. Connect samjonaidi-ship-it/universal-auth (authorize org access)
#   3. Service name: auth-sdk-demo, root directory /demo
#   4. Custom domain: auth-sdk-demo.buildwithbainbridge.com (Railway auto-issues SSL)
#   5. Cloudflare DNS CNAME: auth-sdk-demo → <railway-target>.up.railway.app
#   6. Generate project token → RAILWAY_TOKEN secret in repo
#   7. Copy service id → RAILWAY_SERVICE_AUTH_DEMO secret in repo

name: Deploy Demo to Railway

on:
  workflow_dispatch: {}

concurrency:
  group: demo-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Build SDK (so demo can resolve workspace dep)
        run: |
          pnpm install --frozen-lockfile=false
          pnpm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy demo via Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd demo
          railway up \
            --service "${{ secrets.RAILWAY_SERVICE_AUTH_DEMO }}" \
            --detach
