# @bb/universal-auth | test/integration/docker-compose.test.yml | v1.1.0 | 2026-05-01 | BB
# Integration test stack per SDK spec §11.3 + plan Block 6 Day 18-19.
#
# v1.1.0 (2026-05-01): added bb_runtime_app schema bootstrap. Without it,
# CT BFF migration 018_bbscan_feature_flags.sql fails on `bb_runtime_app.ct_users(id)`
# FK with "schema bb_runtime_app does not exist" because that schema is owned
# by the sibling Bridge repo, not CT BFF. Production shares one Neon DB across
# both apps; fresh test postgres doesn't. The seed file at
# `00_seed_bb_runtime_app.sql` is loaded FIRST (alphabetical) and creates the
# schema + ct_users table stub. Refresh procedure documented inside the file.
#
# Brings up: ct-bff + postgres (Neon-compatible schema) + twilio-mock + resend-mock
#
# Usage from repo root:
#   docker compose -f test/integration/docker-compose.test.yml up -d
#   pnpm test:integration
#   docker compose -f test/integration/docker-compose.test.yml down -v
#
# Or from the test runner via testcontainers (when we wire that up Day 19+):
#   pnpm test:integration  # auto-spawns the stack
#
# Service map:
#   - postgres:        port 5432 (host) → 5432 (container) — Neon-compatible
#   - ct-bff:          port 3300 (host) → 3300 (container) — real BFF, env-pointed at the postgres
#   - twilio-mock:     port 8443 (host) → 8080 (container) — captures SMS sends
#   - resend-mock:     port 8444 (host) → 8080 (container) — captures email sends
#
# All services on the `bb-integration` network so they can reach each other by name.

services:
  postgres:
    image: postgres:16-alpine
    container_name: bb-integration-postgres
    environment:
      POSTGRES_USER: bb_test
      POSTGRES_PASSWORD: bb_test_pwd
      POSTGRES_DB: ct_bff_test
    ports:
      - "5432:5432"
    networks:
      - bb-integration
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bb_test -d ct_bff_test"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      # Order matters: postgres processes /docker-entrypoint-initdb.d/*.sql alphabetically.
      # 1. `00_seed_bb_runtime_app.sql` (this dir) creates bb_runtime_app schema + ct_users
      #    stub — required by CT BFF migration 018+ which has FKs to that schema.
      # 2. CT BFF's `bff/migrations/*.sql` (numbered 001+) runs after the seed.
      - ./00_seed_bb_runtime_app.sql:/docker-entrypoint-initdb.d/00_seed_bb_runtime_app.sql:ro
      - ../../../BB_ControlTower/bff/migrations:/docker-entrypoint-initdb.d/ct_bff:ro
      # Concat trick: mount the bff/migrations folder under a subdir so they don't
      # mix with our seed but ALSO get processed. Postgres only walks the top
      # level of /docker-entrypoint-initdb.d, so use a chained init script that
      # processes the subdir.
      - ./run-ct-bff-migrations.sh:/docker-entrypoint-initdb.d/01_run_ct_bff_migrations.sh:ro

  twilio-mock:
    # Port 8443 host → 8080 container; captures POST /2010-04-01/Accounts/.../Messages.json
    # Returns a fake Twilio response shape so the SDK's enroll-flow + code-flow
    # paths can verify they format the request correctly.
    image: stoplight/prism:5
    container_name: bb-integration-twilio-mock
    command: mock -h 0.0.0.0 -p 8080 /spec/twilio.json
    ports:
      - "8443:8080"
    networks:
      - bb-integration
    volumes:
      - ./mocks/twilio-spec.json:/spec/twilio.json:ro

  resend-mock:
    image: stoplight/prism:5
    container_name: bb-integration-resend-mock
    command: mock -h 0.0.0.0 -p 8080 /spec/resend.json
    ports:
      - "8444:8080"
    networks:
      - bb-integration
    volumes:
      - ./mocks/resend-spec.json:/spec/resend.json:ro

  ct-bff:
    # The real CT BFF, pointed at the test postgres + mocks
    # Built from the BB_ControlTower repo's Dockerfile
    build:
      context: ../../../BB_ControlTower
      dockerfile: Dockerfile
    container_name: bb-integration-ct-bff
    depends_on:
      postgres:
        condition: service_healthy
      twilio-mock:
        condition: service_started
      resend-mock:
        condition: service_started
    environment:
      DATABASE_URL: postgres://bb_test:bb_test_pwd@postgres:5432/ct_bff_test
      TWILIO_BASE_URL: http://twilio-mock:8080
      RESEND_BASE_URL: http://resend-mock:8080
      BB_MODE: test
      PORT: "3300"
      # Per spec §10 — accept TEST_MODE_KEY for header-gated test mode
      TEST_MODE_KEY: test-key-do-not-use-in-prod
      # Tighten TTLs for fast test cycles per spec §10.2
      ACCESS_TOKEN_TTL_SEC: "60"
      REFRESH_TOKEN_TTL_SEC: "300"
    ports:
      - "3300:3300"
    networks:
      - bb-integration
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3300/healthz || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 15s

networks:
  bb-integration:
    driver: bridge
